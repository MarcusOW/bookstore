name: Python Pull Request Workflow

on: [pull_request]

jobs:
  qa:
    name: Quality check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bookstore_dev
          POSTGRES_PASSWORD: bookstore_dev
          POSTGRES_DB: bookstore_dev_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==2.4.1

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        env:
          SECRET_KEY: "django-insecure-ci-test-key"
          DEBUG: "1"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: bookstore_dev_db
          SQL_USER: bookstore_dev
          SQL_PASSWORD: bookstore_dev
          SQL_HOST: localhost
          SQL_PORT: 5432
        run: poetry run python manage.py test

      - name: Wemake Python Styleguide
        uses: wemake-services/wemake-python-styleguide@0.19.2
        continue-on-error: true
        with:
          reporter: "github-pr-review"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
